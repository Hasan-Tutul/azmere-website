<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Azmere</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500&family=Noto+Serif+Bengali:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-banner">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><a href="cart.html">Cart</a><span>/</span><span>Checkout</span></div>
    <h1>Checkout</h1>
  </div>
</div>

<section>
  <div class="container" id="checkoutContainer"></div>
</section>

<script src="app.js"></script>
<script>
  function renderCheckout(){
    const cart = getCart();
    const container = document.getElementById("checkoutContainer");

    if(cart.length === 0){
      container.innerHTML = `
        <div class="empty-state">
          <h2>Nothing to check out yet</h2>
          <p>Add a few favourites to your cart before checking out.</p>
          <a href="category.html" class="btn btn-maroon">Browse Collection</a>
        </div>`;
      return;
    }

    const subtotal = cartTotal();
    const delivery = subtotal >= 3000 ? 0 : 80;
    const total = subtotal + delivery;

    const miniLines = cart.map(line=>{
      const p = findProduct(line.id);
      if(!p) return "";
      return `
        <div class="mini-line">
          <img src="${img(p.images[0],140,180)}" alt="${p.name}">
          <div>
            <div class="mini-line-title">${p.name}</div>
            <div class="mini-line-qty">${line.color} · ${line.size} · Qty ${line.qty}</div>
          </div>
          <div class="mini-line-price">${fmt(p.price*line.qty)}</div>
        </div>`;
    }).join("");

    container.innerHTML = `
      <form class="checkout-wrap" id="checkoutForm" onsubmit="return submitOrder(event)">
        <div>
          <h3 style="margin-bottom:20px;">Delivery Details</h3>
          <div class="form-row">
            <div class="form-group"><label for="fname">Full Name</label><input id="fname" type="text" required placeholder="Your full name"></div>
            <div class="form-group"><label for="fphone">Phone Number</label><input id="fphone" type="tel" required placeholder="01XXXXXXXXX"></div>
          </div>
          <div class="form-group"><label for="femail">Email (optional)</label><input id="femail" type="email" placeholder="you@example.com"></div>
          <div class="form-group"><label for="faddr">Delivery Address</label><textarea id="faddr" rows="3" required placeholder="House, road, area, city" style="width:100%;border:1px solid var(--line);padding:13px 14px;font-family:var(--body);font-size:14.5px;background:var(--white);border-radius:var(--radius);"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label for="fcity">City</label>
              <select id="fcity" class="input">
                <option>Dhaka</option><option>Chattogram</option><option>Khulna</option><option>Rajshahi</option><option>Sylhet</option><option>Other</option>
              </select>
            </div>
            <div class="form-group"><label for="fnote">Order Note (optional)</label><input id="fnote" type="text" placeholder="Delivery instructions"></div>
          </div>

          <h3 style="margin:30px 0 16px;">Payment Method</h3>
          <div class="pay-options" id="payOptions">
            <label class="pay-option active"><input type="radio" name="pay" value="cod" checked onchange="selectPay(this)"> Cash on Delivery</label>
            <label class="pay-option"><input type="radio" name="pay" value="bkash" onchange="selectPay(this)"> bKash</label>
            <label class="pay-option"><input type="radio" name="pay" value="card" onchange="selectPay(this)"> Card / Online Payment</label>
          </div>
        </div>

        <div class="summary-card">
          <h3>Order Summary</h3>
          ${miniLines}
          <div class="summary-row" style="margin-top:14px;"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
          <div class="summary-row"><span>Delivery</span><span>${delivery===0?"Free":fmt(delivery)}</span></div>
          <div class="summary-row total"><span>Total</span><span>${fmt(total)}</span></div>
          <button type="submit" class="btn btn-maroon btn-block" style="margin-top:18px;">Place Order</button>
          <a href="cart.html" class="btn btn-ghost btn-block" style="margin-top:10px;">Back to Cart</a>
        </div>
      </form>`;
  }

  function selectPay(input){
    document.querySelectorAll(".pay-option").forEach(l=>l.classList.remove("active"));
    input.closest(".pay-option").classList.add("active");
  }

  function submitOrder(e){
    e.preventDefault();
    const orderId = "AZM" + Math.floor(100000 + Math.random()*900000);
    localStorage.removeItem(CART_KEY);
    document.getElementById("checkoutContainer").innerHTML = `
      <div class="order-success">
        <div class="mark">✓</div>
        <h2>Thank you! Your order is confirmed.</h2>
        <p>Order <strong>#${orderId}</strong> has been placed. We'll call you shortly to confirm delivery details.</p>
        <a href="index.html" class="btn btn-maroon">Continue Shopping</a>
      </div>`;
    updateCartCount();
    return false;
  }

  renderHeader("");
  renderFooter();
  renderCheckout();
</script>
</body>
</html>
